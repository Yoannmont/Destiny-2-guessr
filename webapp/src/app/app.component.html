<span id="stars-1"></span>
<span id="stars-2"></span>
<span id="stars-3"></span>

<span *ngIf="!(this.utilsService.sidebarLayout | async); then header else sidebar"></span>

<ng-template #header>
    <!-- <div *ngIf="this.loaderService.isLoading | async"><app-loading></app-loading></div> -->
        <app-header></app-header>
        <router-outlet></router-outlet>
        <app-footer></app-footer>
</ng-template>
<ng-template #sidebar>
    <!-- <div *ngIf="this.loaderService.isLoading | async"><app-loading></app-loading></div> -->
    <main class="content-wrapper" [class.shifted]="this.utilsService.isSidebarVisible">
        <app-sidebar></app-sidebar>
        <div class="router-outlet-wrapper" [class.shifted]="this.utilsService.isSidebarVisible">
            
            <router-outlet></router-outlet>
        </div>
    </main>
</ng-template>
